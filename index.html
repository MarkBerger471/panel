<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKD Plant Manager | Panel Evaluation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        mb: {
                            black: '#0d0d0d',
                            dark: '#1a1a1a',
                            silver: '#c0c0c0',
                            accent: '#00adef',
                            gold: '#c4a35a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-strong {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Priority tier left borders */
        .tier-core { border-left: 3px solid #c4a35a; }
        .tier-secondary { border-left: 3px solid rgba(0, 173, 239, 0.6); }
        .tier-plus { border-left: 3px solid rgba(255, 255, 255, 0.15); }

        /* Star rating */
        .star-rating { display: flex; gap: 2px; }
        .star-btn {
            cursor: pointer;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.15);
            transition: all 0.15s ease;
            user-select: none;
            line-height: 1;
            padding: 2px;
        }
        .star-btn.active { color: #c4a35a; }
        .star-btn:hover { color: #c4a35a; transform: scale(1.15); }

        textarea {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: #e5e5e5;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: rgba(0, 173, 239, 0.5);
            box-shadow: 0 0 0 2px rgba(0, 173, 239, 0.15);
        }
        textarea::placeholder { color: rgba(255,255,255,0.25); }

        .nav-link {
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        .nav-link.active { border-bottom-color: #c4a35a; color: #fff; }
        .nav-link:hover { color: #fff; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .score-bar { transition: width 0.6s ease; }

        .btn-primary {
            background: linear-gradient(135deg, rgba(196,163,90,0.3), rgba(196,163,90,0.1));
            border: 1px solid rgba(196,163,90,0.3);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(196,163,90,0.5), rgba(196,163,90,0.2));
            border-color: rgba(196,163,90,0.5);
        }

        .candidate-tab { transition: all 0.3s ease; }
        .candidate-tab.active {
            background: rgba(196,163,90,0.15);
            border-color: rgba(196,163,90,0.4);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        @media print {
            body { background: #fff !important; color: #000 !important; }
            .glass, .glass-strong, .glass-card { background: #f5f5f5 !important; border-color: #ddd !important; backdrop-filter: none !important; }
            .no-print { display: none !important; }
            .star-btn { color: #ccc !important; }
            .star-btn.active { color: #c4a35a !important; }
            textarea { background: #fff !important; border-color: #ccc !important; color: #000 !important; }
            * { color: #000 !important; }
            .tier-core { border-left-color: #c4a35a !important; }
            .tier-secondary { border-left-color: #00adef !important; }
            .tier-plus { border-left-color: #ccc !important; }
        }

        /* Login */
        .login-bg {
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0d0d0d 70%);
        }
        #login-screen input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
        }
        #login-screen input:focus {
            outline: none;
            border-color: rgba(196,163,90,0.5);
            box-shadow: 0 0 0 2px rgba(196,163,90,0.15);
        }
        #login-screen input::placeholder { color: rgba(255,255,255,0.25); }

        .shake {
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body class="text-gray-300">

    <!-- Login Screen -->
    <div id="login-screen" class="login-bg fixed inset-0 z-[200] flex items-center justify-center">
        <div class="text-center">
            <img src="mercedes-logo.svg" alt="Mercedes-Benz" class="w-24 h-24 mx-auto mb-8 opacity-80">
            <h1 class="text-white text-lg font-semibold tracking-[0.3em] uppercase mb-1">Panel Evaluation</h1>
            <p class="text-xs text-gray-500 tracking-widest uppercase mb-10">CKD Plant Manager &middot; E3</p>
            <form onsubmit="return handleLogin(event)" class="max-w-xs mx-auto">
                <input type="password" id="login-password" placeholder="Enter password" autofocus
                    class="w-full rounded-xl px-5 py-3.5 text-sm text-center tracking-widest mb-4">
                <button type="submit" class="btn-primary w-full rounded-xl px-5 py-3.5 text-white text-sm tracking-widest uppercase">
                    Enter
                </button>
                <p id="login-error" class="text-red-400/70 text-xs mt-4 hidden">Invalid password</p>
            </form>
        </div>
    </div>

    <!-- App -->
    <div id="app" class="hidden">

    <!-- Header -->
    <header class="glass-strong sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <img src="mercedes-logo.svg" alt="Mercedes-Benz" class="w-10 h-10 opacity-70">
                <div>
                    <h1 class="text-white text-lg font-semibold tracking-wider uppercase">Panel Evaluation</h1>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <nav class="flex gap-6 no-print">
                    <button onclick="showPage('evaluation')" class="nav-link active text-sm text-gray-400 pb-1 uppercase tracking-wider" id="nav-eval">Evaluation</button>
                    <button onclick="showPage('summary')" class="nav-link text-sm text-gray-400 pb-1 uppercase tracking-wider" id="nav-summary">Summary</button>
                </nav>
                <button onclick="logout()" class="no-print text-xs text-gray-600 hover:text-gray-400 transition-colors uppercase tracking-wider">Logout</button>
            </div>
        </div>
    </header>

    <!-- Legend -->
    <div class="max-w-7xl mx-auto px-6 pt-6 pb-2 no-print">
        <div class="flex items-center gap-6 text-[10px] uppercase tracking-widest text-gray-500">
            <span class="flex items-center gap-2"><span class="w-3 h-0.5 bg-[#c4a35a] inline-block"></span> Must-Have / Essential</span>
            <span class="flex items-center gap-2"><span class="w-3 h-0.5 bg-[rgba(0,173,239,0.6)] inline-block"></span> Strong Differentiators</span>
            <span class="flex items-center gap-2"><span class="w-3 h-0.5 bg-white/15 inline-block"></span> Optional / Plus</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-4">

        <!-- Evaluation Page -->
        <div id="page-evaluation" class="fade-in">

            <!-- Candidate Name Inputs -->
            <div class="glass rounded-2xl p-6 mb-6">
                <h2 class="text-white text-sm font-semibold tracking-widest uppercase mb-4">Candidates</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider mb-2 block">Candidate 1</label>
                        <input type="text" id="candidate1-name" placeholder="Enter candidate name"
                            class="w-full bg-transparent border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/25 focus:outline-none focus:border-mb-gold/50 focus:ring-2 focus:ring-mb-gold/15 transition-all"
                            oninput="saveCandidateNames()">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 uppercase tracking-wider mb-2 block">Candidate 2</label>
                        <input type="text" id="candidate2-name" placeholder="Enter candidate name"
                            class="w-full bg-transparent border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/25 focus:outline-none focus:border-mb-gold/50 focus:ring-2 focus:ring-mb-gold/15 transition-all"
                            oninput="saveCandidateNames()">
                    </div>
                </div>
            </div>

            <!-- Candidate Tabs -->
            <div class="flex gap-4 mb-6 no-print">
                <button onclick="switchCandidate(1)" id="tab-c1" class="candidate-tab active glass rounded-xl px-6 py-3 text-white text-sm font-medium tracking-wider uppercase border border-white/10">
                    <span id="tab-c1-label">Candidate 1</span>
                </button>
                <button onclick="switchCandidate(2)" id="tab-c2" class="candidate-tab glass rounded-xl px-6 py-3 text-gray-400 text-sm font-medium tracking-wider uppercase border border-white/10">
                    <span id="tab-c2-label">Candidate 2</span>
                </button>
            </div>

            <!-- Evaluation Form -->
            <div id="evaluation-form"></div>

            <!-- Panel Debrief -->
            <div class="glass rounded-2xl p-6 mt-6">
                <h2 class="text-white text-sm font-semibold tracking-widest uppercase mb-6">Panel Debrief</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs text-mb-gold uppercase tracking-wider mb-2 block">A. Role-Fit Strengths Observed</label>
                        <textarea id="debrief-strengths" rows="3" class="w-full rounded-xl px-4 py-3 text-sm" placeholder="Which role requirements were clearly evidenced?" oninput="saveDebrief()"></textarea>
                    </div>
                    <div>
                        <label class="text-xs text-mb-gold uppercase tracking-wider mb-2 block">B. Areas Requiring Deeper Validation</label>
                        <textarea id="debrief-validation" rows="3" class="w-full rounded-xl px-4 py-3 text-sm" placeholder="Which topics were insufficiently evidenced?" oninput="saveDebrief()"></textarea>
                    </div>
                    <div>
                        <label class="text-xs text-mb-gold uppercase tracking-wider mb-2 block">C. Risk Considerations</label>
                        <textarea id="debrief-risks" rows="3" class="w-full rounded-xl px-4 py-3 text-sm" placeholder="Where could the candidate struggle?" oninput="saveDebrief()"></textarea>
                    </div>
                    <div>
                        <label class="text-xs text-mb-gold uppercase tracking-wider mb-2 block">D. Key Follow-Up Probes</label>
                        <textarea id="debrief-followup" rows="3" class="w-full rounded-xl px-4 py-3 text-sm" placeholder="What must be clarified in more depth?" oninput="saveDebrief()"></textarea>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-4 mt-6 mb-4 no-print">
                <button onclick="resetCurrentCandidate()" class="glass rounded-xl px-6 py-3 text-gray-400 text-sm font-medium tracking-wider uppercase border border-white/10 hover:text-white hover:border-white/20 transition-all">
                    Reset Current
                </button>
                <button onclick="showPage('summary')" class="btn-primary rounded-xl px-8 py-3 text-white text-sm font-medium tracking-wider uppercase">
                    View Summary &rarr;
                </button>
            </div>
        </div>

        <!-- Summary Page -->
        <div id="page-summary" class="fade-in hidden">

            <div class="flex justify-between items-center mb-8">
                <h2 class="text-white text-xl font-semibold tracking-wider uppercase">Comparative Summary</h2>
                <div class="flex gap-3 no-print">
                    <button onclick="exportJSON()" class="glass rounded-xl px-5 py-2.5 text-gray-400 text-xs font-medium tracking-wider uppercase border border-white/10 hover:text-white transition-all">Export JSON</button>
                    <button onclick="window.print()" class="glass rounded-xl px-5 py-2.5 text-gray-400 text-xs font-medium tracking-wider uppercase border border-white/10 hover:text-white transition-all">Print / PDF</button>
                    <button onclick="saveToGitHub()" class="btn-primary rounded-xl px-5 py-2.5 text-white text-xs font-medium tracking-wider uppercase">Save to GitHub</button>
                </div>
            </div>

            <!-- Overall Score Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8" id="summary-score-cards"></div>

            <!-- Per-criteria comparison: two columns, rating + comments together -->
            <div id="criteria-comparison"></div>

            <!-- Debrief Comparison -->
            <div class="glass rounded-2xl p-6 mt-8" id="debrief-comparison"></div>

        </div>
    </main>

    <!-- GitHub Modal -->
    <div id="github-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="glass-strong rounded-2xl p-8 max-w-md w-full mx-4">
            <h3 class="text-white text-sm font-semibold tracking-widest uppercase mb-6">Save to GitHub</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-500 uppercase tracking-wider mb-2 block">GitHub Personal Access Token</label>
                    <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx"
                        class="w-full bg-transparent border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-white/25 focus:outline-none focus:border-mb-gold/50 transition-all">
                </div>
                <div>
                    <label class="text-xs text-gray-500 uppercase tracking-wider mb-2 block">Repository (owner/repo)</label>
                    <input type="text" id="gh-repo" placeholder="your-username/panel-evaluations"
                        class="w-full bg-transparent border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-white/25 focus:outline-none focus:border-mb-gold/50 transition-all">
                </div>
                <div>
                    <label class="text-xs text-gray-500 uppercase tracking-wider mb-2 block">File Path</label>
                    <input type="text" id="gh-path" value="evaluations/panel-evaluation.json"
                        class="w-full bg-transparent border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-white/25 focus:outline-none focus:border-mb-gold/50 transition-all">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeGitHubModal()" class="flex-1 glass rounded-xl px-4 py-3 text-gray-400 text-sm tracking-wider uppercase border border-white/10 hover:text-white transition-all">Cancel</button>
                    <button onclick="commitToGitHub()" class="flex-1 btn-primary rounded-xl px-4 py-3 text-white text-sm tracking-wider uppercase">Save</button>
                </div>
                <p id="gh-status" class="text-xs text-center mt-2 hidden"></p>
            </div>
        </div>
    </div>

    <footer class="max-w-7xl mx-auto px-6 py-8 text-center no-print">
        <p class="text-xs text-gray-600 tracking-wider uppercase">Panel Evaluation System &middot; Confidential</p>
    </footer>

    </div><!-- /app -->

<script>
// ── Login ──
const PASSWORD = 'pekan';

function handleLogin(e) {
    e.preventDefault();
    const val = document.getElementById('login-password').value;
    if (val === PASSWORD) {
        sessionStorage.setItem('mb-panel-auth', '1');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        return false;
    }
    const errEl = document.getElementById('login-error');
    errEl.classList.remove('hidden');
    const input = document.getElementById('login-password');
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 500);
    return false;
}

function checkAuth() {
    if (sessionStorage.getItem('mb-panel-auth') === '1') {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
    }
}

function logout() {
    sessionStorage.removeItem('mb-panel-auth');
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').classList.add('hidden');
}

// ── Criteria Data ──
// tier: 'core' | 'secondary' | 'plus'
const criteria = [
    // ── Must-Have / Essential ──
    {
        id: 'operational-performance', num: 1,
        title: 'Operational Performance Leadership',
        subtitle: 'SQDCE / KPI Ownership',
        tier: 'core',
        why: 'This role is accountable for plant performance across Safety, Quality, Delivery, Cost/Efficiency, and People/Morale.',
        evidence: ['KPI recovery examples', 'Escalation & steering methods', 'Quantified operational improvement', 'Leadership cadence & decision logic'],
        questions: [
            'Tell us about a time when multiple plant KPIs were off target at the same time. How did you prioritize and recover performance?',
            'How do you run a management cadence around daily, weekly, and monthly performance?',
            'Which operational KPIs do you personally watch most closely, and why?',
        ]
    },
    {
        id: 'quality-discipline', num: 2,
        title: 'Quality and Product-Release Discipline',
        tier: 'core',
        why: 'Quality issues in a CKD plant quickly affect delivery, rework, cost, and customer perception.',
        evidence: ['Defect reduction or release stabilization', 'Root-cause methodology', 'Cross-functional coordination', 'Long-term prevention measures'],
        questions: [
            'Tell us about a serious quality issue you owned end-to-end.',
            'How do you prevent repeated containment without true root-cause resolution?',
            'How do you balance production pressure with quality-release requirements?',
        ]
    },
    {
        id: 'safety-compliance', num: 3,
        title: 'Safety, Compliance, and Risk Management',
        tier: 'core',
        why: 'The plant manager must create a culture where safety and compliance are non-negotiable.',
        evidence: ['Incident prevention examples', 'Audit or compliance ownership', 'Management routines tied to safety', 'Escalation and decision behavior'],
        questions: [
            'Describe a time when safety requirements conflicted with production needs.',
            'How do you ensure plant leaders treat safety as part of daily management?',
            'Tell us about an audit finding that required rapid action.',
        ]
    },
    {
        id: 'supply-chain', num: 4,
        title: 'Supply Chain / CKD Network Steering Capability',
        tier: 'core',
        why: 'This role sits in a CKD network context with supply constraints, localization, logistics dependencies, and cross-functional interfaces.',
        evidence: ['Supply recovery examples', 'Stakeholder coordination across functions', 'Understanding of CKD operating complexity', 'Business impact of decisions'],
        questions: [
            'Tell us about a major supply disruption that threatened output.',
            'How do you manage plant performance when the root cause sits outside production?',
            'Describe your experience with CKD/SKD network complexity.',
        ]
    },
    {
        id: 'lean-leadership', num: 5,
        title: 'Lean Leadership / Continuous Improvement / Problem Solving',
        tier: 'core',
        why: 'At E3 level, the role must build systems, not just solve incidents.',
        evidence: ['Lean / CI examples', 'Standardization and sustainment', 'Management system design', 'Coaching vs firefighting behavior'],
        questions: [
            'Describe a plant improvement you led that stayed in place over time.',
            'What does good daily performance management look like to you?',
            'How do you make problems visible early?',
        ]
    },
    {
        id: 'people-leadership', num: 6,
        title: 'People Leadership and Team Development',
        tier: 'core',
        why: 'An E3 plant manager must lead through people, develop successors, and create accountability and trust.',
        evidence: ['Coaching and development examples', 'Team turnaround stories', 'Conflict handling', 'Succession / talent development outcomes'],
        questions: [
            'Tell us about a time you had to rebuild confidence in a leadership team.',
            'How do you develop your direct reports?',
            'Describe a case where you addressed persistent underperformance.',
        ]
    },
    // ── Strong Differentiators ──
    {
        id: 'strategic-thinking', num: 7,
        title: 'Strategic Thinking and Future Readiness',
        tier: 'secondary',
        why: 'The role must connect current plant performance with future portfolio, investment, and operating model evolution.',
        evidence: ['Strategic examples with operational consequences', 'Investment or readiness thinking', 'Balance of short-term and long-term decisions'],
        questions: [
            'How do you decide what to improve now versus what to prepare for next?',
            'Tell us about a strategic decision that improved medium-term plant readiness.',
            'How do you connect daily priorities with long-term direction?',
        ]
    },
    {
        id: 'financial-acumen', num: 8,
        title: 'Financial Acumen and Business-Case Orientation',
        tier: 'secondary',
        why: 'An E3 leader must understand cost, savings levers, investment logic, and trade-offs.',
        evidence: ['Quantified business cases', 'Understanding of fixed vs variable cost levers', 'Financial logic in decision-making'],
        questions: [
            'Tell us about a plant decision where you had to justify cost versus operational benefit.',
            'What are the biggest cost levers in a CKD environment?',
            'Describe improving plant economics without weakening safety or quality.',
        ]
    },
    {
        id: 'digitalization', num: 9,
        title: 'Digitalization and Management Transparency',
        tier: 'secondary',
        why: 'A modern plant manager should lead with data, transparency, and structured performance visibility.',
        evidence: ['Digitalization or KPI transparency examples', 'Impact on decision speed or accuracy', 'Leadership use of data'],
        questions: [
            'How have you improved management transparency in a plant?',
            'Tell us about a digital change that improved decisions.',
            'How do you avoid "too much data" and focus on the right signals?',
        ]
    },
    {
        id: 'stakeholder-management', num: 10,
        title: 'Stakeholder Management across HQ / Country / Contract Manufacturer',
        tier: 'secondary',
        why: 'The Pekan setup requires strong alignment across central functions, local stakeholders, and external interfaces.',
        evidence: ['Multi-stakeholder coordination examples', 'Escalation maturity', 'Communication style and influence pattern'],
        questions: [
            'Tell us about aligning multiple stakeholders with different priorities.',
            'How do you handle tension between local plant needs and central expectations?',
            'Describe when external partners affected your plant outcome.',
        ]
    },
    // ── Optional / Plus ──
    {
        id: 'sustainability', num: 11,
        title: 'Sustainability and Green Production Leadership',
        tier: 'plus',
        why: 'Increasingly relevant where plants are measured on energy, waste, water, and CO\u2082 performance.',
        evidence: ['Resource or emissions improvement examples', 'Operational relevance beyond policy awareness'],
        questions: [
            'How have you translated sustainability targets into plant actions?',
            'Tell us about a resource-efficiency initiative you led.',
        ]
    },
    {
        id: 'executive-presence', num: 12,
        title: 'Executive Presence / External Representation / Storytelling',
        tier: 'plus',
        why: 'The role may need to represent the plant in leadership forums, visits, and high-visibility discussions.',
        evidence: ['Clarity, composure, credibility', 'Ability to communicate complex issues simply'],
        questions: [
            'Tell us about representing a difficult plant situation to senior leadership.',
            'How do you communicate bad news while maintaining confidence?',
        ]
    }
];

// ── State ──
let currentCandidate = 1;
const STORAGE_KEY = 'mb-panel-eval';

function getState() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
    return {
        candidateNames: { 1: '', 2: '' },
        ratings: { 1: {}, 2: {} },
        comments: { 1: {}, 2: {} },
        debrief: { 1: { strengths: '', validation: '', risks: '', followup: '' }, 2: { strengths: '', validation: '', risks: '', followup: '' } },
        github: { token: '', repo: '', path: 'evaluations/panel-evaluation.json' }
    };
}

function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ── Tier helpers ──
function tierClass(tier) {
    if (tier === 'core') return 'tier-core';
    if (tier === 'secondary') return 'tier-secondary';
    return 'tier-plus';
}

function tierBadge(tier) {
    if (tier === 'core') return '<span class="ml-2 text-[10px] bg-[#c4a35a]/20 text-[#c4a35a] px-2 py-0.5 rounded-full uppercase tracking-wider font-medium">Must-Have</span>';
    if (tier === 'secondary') return '<span class="ml-2 text-[10px] bg-[#00adef]/15 text-[#00adef]/80 px-2 py-0.5 rounded-full uppercase tracking-wider font-medium">Differentiator</span>';
    return '<span class="ml-2 text-[10px] bg-white/5 text-white/40 px-2 py-0.5 rounded-full uppercase tracking-wider font-medium">Optional</span>';
}

// ── Star Rating (double-click to reset) ──
function renderStars(criteriaId, currentRating) {
    let html = '<div class="star-rating">';
    for (let i = 1; i <= 5; i++) {
        const activeClass = i <= currentRating ? 'active' : '';
        html += `<span class="star-btn ${activeClass}" data-criteria="${criteriaId}" data-value="${i}" onclick="handleStarClick('${criteriaId}', ${i})" ondblclick="handleStarDblClick('${criteriaId}')">&#9733;</span>`;
    }
    html += '</div>';
    return html;
}

function handleStarClick(criteriaId, value) {
    const state = getState();
    state.ratings[currentCandidate][criteriaId] = value;
    saveState(state);
    // Update stars visually without full re-render
    const stars = document.querySelectorAll(`.star-btn[data-criteria="${criteriaId}"]`);
    stars.forEach(s => {
        const v = parseInt(s.dataset.value);
        s.classList.toggle('active', v <= value);
    });
}

function handleStarDblClick(criteriaId) {
    const state = getState();
    delete state.ratings[currentCandidate][criteriaId];
    saveState(state);
    const stars = document.querySelectorAll(`.star-btn[data-criteria="${criteriaId}"]`);
    stars.forEach(s => s.classList.remove('active'));
}

// ── Render Evaluation Form ──
function renderForm() {
    const state = getState();
    const c = currentCandidate;
    let html = '';

    // Group by tier
    const tiers = [
        { key: 'core', label: 'Must-Have / Essential' },
        { key: 'secondary', label: 'Strong Differentiators' },
        { key: 'plus', label: 'Optional / Plus' }
    ];

    tiers.forEach(tier => {
        const items = criteria.filter(cr => cr.tier === tier.key);
        if (!items.length) return;

        html += `<div class="mb-2">`;

        items.forEach(cr => {
            const rating = state.ratings[c][cr.id] || 0;
            const comment = state.comments[c][cr.id] || '';

            html += `
            <div class="glass-card ${tierClass(cr.tier)} rounded-2xl p-6 mb-3 fade-in">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-1">
                            <span class="text-gray-500 text-xs font-semibold tracking-widest">${String(cr.num).padStart(2, '0')}</span>
                            <h3 class="text-white font-semibold text-base tracking-wide">${cr.title}</h3>
                            ${tierBadge(cr.tier)}
                        </div>
                    </div>
                    ${renderStars(cr.id, rating)}
                </div>

                <p class="text-xs text-gray-500 mb-3 leading-relaxed">${cr.why}</p>

                <details class="mb-3 group">
                    <summary class="text-xs text-mb-accent/70 cursor-pointer hover:text-mb-accent transition-colors uppercase tracking-wider">
                        Reference Questions & Evidence
                    </summary>
                    <div class="mt-3 pl-4 border-l border-white/5 space-y-3">
                        <div>
                            <p class="text-[10px] text-gray-600 uppercase tracking-widest mb-1.5">Sample Questions</p>
                            <ul class="space-y-1">
                                ${cr.questions.map(q => `<li class="text-xs text-gray-400 leading-relaxed">&bull; ${q}</li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-600 uppercase tracking-widest mb-1.5">Evidence to Capture</p>
                            <ul class="space-y-1">
                                ${cr.evidence.map(e => `<li class="text-xs text-gray-400">&bull; ${e}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </details>

                <textarea
                    id="comment-${cr.id}"
                    rows="2"
                    class="w-full rounded-xl px-4 py-3 text-sm"
                    placeholder="Evidence, observations, and notes..."
                    oninput="setComment('${cr.id}')"
                >${comment}</textarea>
            </div>`;
        });

        html += `</div>`;
    });

    document.getElementById('evaluation-form').innerHTML = html;
}

// ── Actions ──
function setComment(criteriaId) {
    const el = document.getElementById(`comment-${criteriaId}`);
    const state = getState();
    state.comments[currentCandidate][criteriaId] = el.value;
    saveState(state);
}

function saveCandidateNames() {
    const state = getState();
    state.candidateNames[1] = document.getElementById('candidate1-name').value;
    state.candidateNames[2] = document.getElementById('candidate2-name').value;
    saveState(state);
    updateTabLabels();
}

function saveDebrief() {
    const state = getState();
    state.debrief[currentCandidate] = {
        strengths: document.getElementById('debrief-strengths').value,
        validation: document.getElementById('debrief-validation').value,
        risks: document.getElementById('debrief-risks').value,
        followup: document.getElementById('debrief-followup').value
    };
    saveState(state);
}

function loadDebrief() {
    const state = getState();
    const d = state.debrief[currentCandidate] || {};
    document.getElementById('debrief-strengths').value = d.strengths || '';
    document.getElementById('debrief-validation').value = d.validation || '';
    document.getElementById('debrief-risks').value = d.risks || '';
    document.getElementById('debrief-followup').value = d.followup || '';
}

function updateTabLabels() {
    const state = getState();
    document.getElementById('tab-c1-label').textContent = state.candidateNames[1] || 'Candidate 1';
    document.getElementById('tab-c2-label').textContent = state.candidateNames[2] || 'Candidate 2';
}

function switchCandidate(num) {
    currentCandidate = num;
    document.getElementById('tab-c1').classList.toggle('active', num === 1);
    document.getElementById('tab-c2').classList.toggle('active', num === 2);
    document.getElementById('tab-c1').classList.toggle('text-gray-400', num !== 1);
    document.getElementById('tab-c2').classList.toggle('text-gray-400', num !== 2);
    document.getElementById('tab-c1').classList.toggle('text-white', num === 1);
    document.getElementById('tab-c2').classList.toggle('text-white', num === 2);
    renderForm();
    loadDebrief();
}

function resetCurrentCandidate() {
    if (!confirm('Reset all ratings and comments for the current candidate?')) return;
    const state = getState();
    state.ratings[currentCandidate] = {};
    state.comments[currentCandidate] = {};
    state.debrief[currentCandidate] = { strengths: '', validation: '', risks: '', followup: '' };
    saveState(state);
    renderForm();
    loadDebrief();
}

// ── Navigation ──
function showPage(page) {
    document.getElementById('page-evaluation').classList.toggle('hidden', page !== 'evaluation');
    document.getElementById('page-summary').classList.toggle('hidden', page !== 'summary');
    document.getElementById('nav-eval').classList.toggle('active', page === 'evaluation');
    document.getElementById('nav-summary').classList.toggle('active', page === 'summary');
    if (page === 'summary') renderSummary();
}

// ── Summary ──
function renderSummary() {
    const state = getState();
    const n1 = state.candidateNames[1] || 'Candidate 1';
    const n2 = state.candidateNames[2] || 'Candidate 2';

    function calcScores(cNum) {
        let total = 0, count = 0, coreTotal = 0, coreCount = 0, secTotal = 0, secCount = 0;
        criteria.forEach(cr => {
            const r = state.ratings[cNum][cr.id];
            if (r) {
                total += r; count++;
                if (cr.tier === 'core') { coreTotal += r; coreCount++; }
                if (cr.tier === 'secondary') { secTotal += r; secCount++; }
            }
        });
        return {
            avg: count ? (total / count).toFixed(2) : '\u2014',
            coreAvg: coreCount ? (coreTotal / coreCount).toFixed(2) : '\u2014',
            secAvg: secCount ? (secTotal / secCount).toFixed(2) : '\u2014',
            filled: count,
            totalCriteria: criteria.length
        };
    }

    const s1 = calcScores(1), s2 = calcScores(2);

    // Score cards
    document.getElementById('summary-score-cards').innerHTML = [
        { name: n1, scores: s1 },
        { name: n2, scores: s2 }
    ].map(({ name, scores }) => `
        <div class="glass-strong rounded-2xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-white font-semibold tracking-wider uppercase text-sm">${name}</h3>
                <span class="text-xs text-gray-500">${scores.filled}/${scores.totalCriteria} rated</span>
            </div>
            <div class="flex items-end gap-8">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Overall</p>
                    <p class="text-4xl font-light text-white">${scores.avg}</p>
                </div>
                <div>
                    <p class="text-[10px] text-[#c4a35a] uppercase tracking-widest mb-1">Must-Have</p>
                    <p class="text-2xl font-light text-[#c4a35a]">${scores.coreAvg}</p>
                </div>
                <div>
                    <p class="text-[10px] text-[#00adef]/70 uppercase tracking-widest mb-1">Differentiators</p>
                    <p class="text-2xl font-light text-[#00adef]/70">${scores.secAvg}</p>
                </div>
            </div>
        </div>
    `).join('');

    // Per-criteria comparison: two columns side-by-side with rating bars + comments
    const tiers = [
        { key: 'core', label: 'Must-Have / Essential', color: '#c4a35a' },
        { key: 'secondary', label: 'Strong Differentiators', color: 'rgba(0,173,239,0.7)' },
        { key: 'plus', label: 'Optional / Plus', color: 'rgba(255,255,255,0.25)' }
    ];

    let compHtml = `
    <div class="glass-card rounded-xl px-5 py-3 mb-6 sticky top-[72px] z-40">
        <div class="grid grid-cols-2 gap-6 ml-[4.5rem]">
            <p class="text-sm text-white font-semibold tracking-wider uppercase">${n1}</p>
            <p class="text-sm text-white font-semibold tracking-wider uppercase">${n2}</p>
        </div>
    </div>`;

    tiers.forEach(tier => {
        const items = criteria.filter(cr => cr.tier === tier.key);
        if (!items.length) return;

        compHtml += `
        <div class="mb-6">
            <div class="flex items-center gap-3 mb-4">
                <span class="w-3 h-0.5 inline-block" style="background:${tier.color}"></span>
                <h3 class="text-white text-xs font-semibold tracking-widest uppercase">${tier.label}</h3>
            </div>`;

        items.forEach(cr => {
            const r1 = state.ratings[1][cr.id] || 0;
            const r2 = state.ratings[2][cr.id] || 0;
            const c1 = state.comments[1][cr.id] || '';
            const c2 = state.comments[2][cr.id] || '';
            const pct1 = (r1 / 5) * 100;
            const pct2 = (r2 / 5) * 100;

            compHtml += `
            <div class="glass-card ${tierClass(cr.tier)} rounded-2xl p-5 mb-3">
                <div class="flex items-center gap-3 mb-4">
                    <span class="text-gray-500 text-xs font-semibold tracking-widest">${String(cr.num).padStart(2, '0')}</span>
                    <h4 class="text-white text-base font-semibold">${cr.title}</h4>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <!-- Candidate 1 -->
                    <div>
                        <div class="flex items-center justify-end mb-2">
                            <span class="text-sm font-semibold ${r1 ? 'text-white' : 'text-gray-600'}">${r1 ? r1 + '/5' : '\u2014'}</span>
                        </div>
                        <div class="h-1.5 bg-white/5 rounded-full overflow-hidden mb-3">
                            <div class="h-full rounded-full score-bar" style="width:${pct1}%;background:${tier.color}"></div>
                        </div>
                        ${c1 ? `<p class="text-xs text-gray-400 leading-relaxed whitespace-pre-wrap">${escHtml(c1)}</p>` : '<p class="text-xs text-gray-600 italic">No comments</p>'}
                    </div>

                    <!-- Candidate 2 -->
                    <div>
                        <div class="flex items-center justify-end mb-2">
                            <span class="text-sm font-semibold ${r2 ? 'text-white' : 'text-gray-600'}">${r2 ? r2 + '/5' : '\u2014'}</span>
                        </div>
                        <div class="h-1.5 bg-white/5 rounded-full overflow-hidden mb-3">
                            <div class="h-full rounded-full score-bar" style="width:${pct2}%;background:${tier.color}"></div>
                        </div>
                        ${c2 ? `<p class="text-xs text-gray-400 leading-relaxed whitespace-pre-wrap">${escHtml(c2)}</p>` : '<p class="text-xs text-gray-600 italic">No comments</p>'}
                    </div>
                </div>
            </div>`;
        });

        compHtml += '</div>';
    });

    document.getElementById('criteria-comparison').innerHTML = compHtml;

    // Debrief comparison
    const d1 = state.debrief[1] || {};
    const d2 = state.debrief[2] || {};
    const hasDebrief = d1.strengths || d1.validation || d1.risks || d1.followup || d2.strengths || d2.validation || d2.risks || d2.followup;

    if (hasDebrief) {
        const fields = [
            { key: 'strengths', label: 'Role-Fit Strengths' },
            { key: 'validation', label: 'Areas Requiring Validation' },
            { key: 'risks', label: 'Risk Considerations' },
            { key: 'followup', label: 'Follow-Up Probes' }
        ];
        let debHtml = '<h3 class="text-white text-sm font-semibold tracking-widest uppercase mb-6">Panel Debrief Comparison</h3>';
        fields.forEach(f => {
            const v1 = d1[f.key] || '';
            const v2 = d2[f.key] || '';
            if (!v1 && !v2) return;
            debHtml += `
            <div class="mb-6">
                <p class="text-xs text-mb-gold uppercase tracking-wider mb-3">${f.label}</p>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">${n1}</p>
                        <p class="text-xs text-gray-400 leading-relaxed whitespace-pre-wrap">${escHtml(v1) || '\u2014'}</p>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">${n2}</p>
                        <p class="text-xs text-gray-400 leading-relaxed whitespace-pre-wrap">${escHtml(v2) || '\u2014'}</p>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('debrief-comparison').innerHTML = debHtml;
    } else {
        document.getElementById('debrief-comparison').innerHTML = '<p class="text-gray-500 text-sm text-center">No debrief notes recorded yet.</p>';
    }
}

function escHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ── GitHub Integration ──
function saveToGitHub() {
    const state = getState();
    document.getElementById('gh-token').value = state.github?.token || '';
    document.getElementById('gh-repo').value = state.github?.repo || '';
    document.getElementById('gh-path').value = state.github?.path || 'evaluations/panel-evaluation.json';
    document.getElementById('github-modal').classList.remove('hidden');
}

function closeGitHubModal() {
    document.getElementById('github-modal').classList.add('hidden');
    document.getElementById('gh-status').classList.add('hidden');
}

async function commitToGitHub() {
    const token = document.getElementById('gh-token').value.trim();
    const repo = document.getElementById('gh-repo').value.trim();
    const path = document.getElementById('gh-path').value.trim();
    const statusEl = document.getElementById('gh-status');

    if (!token || !repo || !path) {
        statusEl.textContent = 'Please fill in all fields.';
        statusEl.className = 'text-xs text-center mt-2 text-red-400';
        statusEl.classList.remove('hidden');
        return;
    }

    const state = getState();
    state.github = { token, repo, path };
    saveState(state);

    statusEl.textContent = 'Saving...';
    statusEl.className = 'text-xs text-center mt-2 text-mb-accent';
    statusEl.classList.remove('hidden');

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));

    try {
        let sha;
        try {
            const existing = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (existing.ok) {
                const data = await existing.json();
                sha = data.sha;
            }
        } catch (e) {}

        const body = { message: `Update panel evaluation - ${new Date().toISOString().split('T')[0]}`, content };
        if (sha) body.sha = sha;

        const res = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        if (res.ok) {
            statusEl.textContent = 'Saved successfully to GitHub!';
            statusEl.className = 'text-xs text-center mt-2 text-green-400';
            setTimeout(closeGitHubModal, 1500);
        } else {
            const err = await res.json();
            statusEl.textContent = `Error: ${err.message}`;
            statusEl.className = 'text-xs text-center mt-2 text-red-400';
        }
    } catch (e) {
        statusEl.textContent = `Error: ${e.message}`;
        statusEl.className = 'text-xs text-center mt-2 text-red-400';
    }
}

function exportJSON() {
    const state = getState();
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `panel-evaluation-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

// ── Init ──
function init() {
    checkAuth();
    const state = getState();
    document.getElementById('candidate1-name').value = state.candidateNames[1] || '';
    document.getElementById('candidate2-name').value = state.candidateNames[2] || '';
    updateTabLabels();
    renderForm();
    loadDebrief();
}

init();
</script>
